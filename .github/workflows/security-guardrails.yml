name: Security Guardrails

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  hardening:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Run hardening checks
        run: ./scripts/check-hardening.sh
